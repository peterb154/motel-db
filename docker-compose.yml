services:
  db:
    build: ./db
    image: waypoint-db:local
    environment:
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands
    ports:
      - "5433:5432"          # host 5433 -> avoid clashing with a local pg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strands -d strands"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Read-only auto-API over the api schema — feeds the future map UI and lets the
  # chain blocklist be tuned via curl without a rebuild.
  postgrest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://strands:strands@db:5432/strands
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_anon
    ports:
      - "3001:3000"
    restart: unless-stopped

  # Lean FastAPI server (server.py). Entrypoint waits for db, runs migrations
  # + town ingest, then serves uvicorn. /api/deploy writes the trigger file on
  # the mounted host repo; a host-side systemd path unit handles the rebuild.
  agent:
    build:
      context: .
      args:
        # Stamp the current git SHA into the image so /api/health can report it.
        GIT_SHA: ${GIT_SHA:-dev}
    image: waypoint-agent:local
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      STRANDS_PG_DSN: postgresql://strands:strands@db:5432/strands
      DEPLOY_TRIGGER: /opt/waypoint/.deploy-trigger
    volumes:
      # Mount the host's repo checkout so /api/deploy can touch the trigger
      # file there. A host-side systemd path unit watches it and handles git
      # pull + rebuild. No docker.sock, no ssh keys needed in the container.
      - .:/opt/waypoint
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
