<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>motel-db — where to stay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --route: #2e7d32; --accept: #1565c0; --marginal: #f9a825; --filter: #b0392b;
    --bg: #14181d; --panel: #1e242c; --ink: #e7ecf2; --muted: #9aa6b2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 15px/1.45 system-ui, sans-serif; color: var(--ink); }
  #app { display: flex; height: 100%; }
  #map { flex: 1; background: var(--bg); }
  #panel {
    width: 380px; max-width: 90vw; background: var(--panel); overflow-y: auto;
    padding: 16px 18px 40px; border-left: 1px solid #000;
  }
  #panel h1 { font-size: 16px; margin: 0 0 2px; }
  #panel .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px;
          font-weight: 600; color: #fff; }
  .b-route { background: var(--route); } .b-accept { background: var(--accept); }
  .b-marginal { background: var(--marginal); color:#222; } .b-filter { background: var(--filter); }
  .score { font-size: 30px; font-weight: 700; }
  .dimwrap { margin: 5px 0; }
  .dimwrap.has { cursor: help; }
  .dim { display: grid; grid-template-columns: 92px 1fr 30px; gap: 6px; align-items: center;
         font-size: 12px; }
  .dimwrap.has .dim > span:first-child { border-bottom: 1px dotted #55606b; }
  .dim-why { display: none; color: var(--muted); font-size: 11.5px; margin: 4px 0 2px 92px;
             border-left: 2px solid #3a4552; padding-left: 8px; }
  .dimwrap.has:hover .dim-why, .dimwrap.show .dim-why { display: block; }
  .bar { height: 7px; background: #303a44; border-radius: 4px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: #5b9bd5; }
  .card { background: #171c22; border: 1px solid #2a323b; border-radius: 8px; padding: 10px 12px;
          margin: 8px 0; }
  .card h3 { margin: 0 0 4px; font-size: 14px; }
  .card .syn { color: var(--muted); font-size: 12.5px; }
  .links { margin-top: 6px; font-size: 12px; }
  .coord { font-family: ui-monospace, SFMono-Regular, monospace; color: #cdd6df; user-select: all;
           -webkit-user-select: all; }
  a { color: #7cb8ff; text-decoration: none; } a:hover { text-decoration: underline; }
  .tip { background: #23303a; border-left: 3px solid #5b9bd5; padding: 8px 10px; border-radius: 4px;
         font-size: 13px; margin-top: 10px; }
  #legend { position: absolute; z-index: 500; left: 10px; bottom: 14px; background: rgba(20,24,29,.9);
            padding: 8px 10px; border-radius: 8px; font-size: 12px; }
  #legend b { display:flex; align-items:center; gap:6px; font-weight:400; margin:2px 0; cursor:pointer; }
  #legend .dot { width: 11px; height: 11px; border-radius: 50%; }
  #legend .off { opacity: .35; text-decoration: line-through; }
  #bar { position: absolute; z-index: 500; top: 10px; left: 10px; display: flex; gap: 6px; }
  #bar input { background: var(--panel); border: 1px solid #333; color: var(--ink);
               padding: 7px 9px; border-radius: 6px; }
  #bar .hint { align-self:center; font-size:11px; color:var(--muted); background:rgba(20,24,29,.85);
               padding:5px 8px; border-radius:6px; }
  #sweepbox { position:absolute; z-index:600; top:52px; left:10px; width:230px; background:var(--panel);
              border:1px solid #333; border-radius:8px; padding:10px 12px; font-size:13px; }
  #sweepbox .sw-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:6px 0; }
  #sweepbox b { font-size:13px; } #sw-close { cursor:pointer; color:var(--muted); }
  #sweepbox .sw-mut { color:var(--muted); font-size:12px; }
  #sweepbox select, #sweepbox input[type=range] { background:var(--bg); color:var(--ink);
              border:1px solid #333; border-radius:5px; }
  #sw-go { width:100%; margin-top:8px; padding:8px; border:0; border-radius:6px; cursor:pointer;
           background:#2b6cb0; color:#fff; font-weight:600; }
  #sw-go[disabled] { background:#3a4552; cursor:default; }
  .empty { color: var(--muted); padding-top: 40px; text-align: center; }
  @media (max-width: 720px) {
    #app { flex-direction: column; }
    #map { height: 55vh; flex: none; }
    #panel { width: 100%; max-width: 100%; height: 45vh; border-left: none; border-top: 1px solid #000; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="map">
    <div id="bar">
      <input id="find" placeholder="filter towns…" autocomplete="off" />
      <span class="hint">click the map to sweep an area</span>
    </div>
    <div id="sweepbox" hidden>
      <div class="sw-row"><b>Sweep an area</b><span id="sw-close">✕</span></div>
      <div id="sw-center" class="sw-mut"></div>
      <div class="sw-row"><span>radius</span>
        <input id="sw-radius" type="range" min="10" max="60" step="5" value="30" />
        <span id="sw-rlabel">30 mi</span></div>
      <div class="sw-row"><span>mode</span>
        <select id="sw-mode"><option value="moto">moto · no B&amp;B</option>
          <option value="couple">couple</option></select></div>
      <div id="sw-preview" class="sw-mut">…</div>
      <button id="sw-go">Sweep</button>
      <div id="sw-prog" class="sw-mut"></div>
    </div>
    <div id="legend"></div>
  </div>
  <div id="panel"><div class="empty">Click a town to see its verdict.</div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = (localStorage.getItem("MOTELDB_API") || "").replace(/\/$/, "");  // same-origin server
const BANDS = {
  "route-worthy": ["b-route", "var(--route)", "Route-worthy"],
  "acceptable":   ["b-accept", "var(--accept)", "Acceptable"],
  "marginal":     ["b-marginal", "var(--marginal)", "Marginal"],
  "filter-out":   ["b-filter", "var(--filter)", "Filter-out"],
};
const DIMS = [
  ["independence_character", "lodging", 2], ["price_tier", "price", 1], ["review_quality", "reviews", 1],
  ["food_proximity_quality", "food", 2], ["food_recency", "recency", 1],
  ["town_charm", "charm", 2], ["riding_context", "riding", 1],
];
const map = L.map("map", { zoomControl: false }).setView([44, -90], 5);
L.control.zoom({ position: "topright" }).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CARTO", maxZoom: 19,
}).addTo(map);

const off = new Set();           // bands toggled off
let rows = [], markers = [];

function color(band) { return getComputedStyle(document.documentElement)
  .getPropertyValue((BANDS[band] || ["", "#888"])[1].replace(/var\((.*)\)/, "$1").trim() || "--muted") || "#888"; }

function sv(lat, lon) { return `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lon}`; }
function gmaps(q) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`; }

function render(r) {
  const [cls, , label] = BANDS[r.band] || ["", "", r.band];
  const bl = r.best_lodging || {};
  const dims = (r.scores || {}), notes = (r.notes || {});
  const dimRows = DIMS.map(([k, lbl, max]) => {
    const v = dims[k] ?? 0, pct = Math.round((v / max) * 100);
    const has = notes[k] ? "has" : "";
    const why = notes[k] ? `<div class="dim-why">${notes[k]}</div>` : "";
    return `<div class="dimwrap ${has}"><div class="dim"><span>${lbl}</span><span class="bar"><i style="width:${pct}%"></i></span><span>${v}/${max}</span></div>${why}</div>`;
  }).join("");
  const hint = Object.keys(notes).length
    ? `<div style="font-size:11px;color:var(--muted);margin:2px 0 4px">hover / tap a dimension for why</div>` : "";
  const coord = (la, lo) => `<span class="coord" title="tap to select for your GPS">${(+la).toFixed(5)}, ${(+lo).toFixed(5)}</span>`;
  const plinks = (name, la, lo) => {
    const out = [`<a href="${gmaps(name + ', ' + r.town + ', ' + r.state)}" target="_blank">Maps ↗</a>`];
    if (la != null) out.push(`<a href="${sv(la, lo)}" target="_blank">Street View ↗</a>`, coord(la, lo));
    return `<div class="links">${out.join(" · ")}</div>`;
  };
  const foods = (r.food || []).map(f =>
    `<div class="card"><h3>🍴 ${f.name || ""}</h3><div class="syn">${f.synthesis || ""}</div>
     ${plinks(f.name, f.lat, f.lon)}</div>`).join("");
  const lodging = bl.name ? `<div class="card"><h3>🛏 ${bl.name} ${bl.soft_brand ? "· soft-brand" : ""}</h3>
      <div class="syn">${bl.synthesis || ""}</div>${plinks(bl.name, bl.lat, bl.lon)}</div>` : "";
  document.getElementById("panel").innerHTML = `
    <h1>${r.town}, ${r.state}</h1>
    <div class="sub">${r.mode || "moto"} · evaluated ${(r.evaluated_at || "").slice(0,10)} · ${coord(r.lat, r.lon)}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span class="score">${r.total}</span><span style="color:var(--muted)">/10</span>
      <span class="chip ${cls}">${label}</span>
      <a style="margin-left:auto" href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lon}" target="_blank">map ↗</a>
    </div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:10px">${r.reason || ""}</div>
    ${hint}${dimRows}
    ${lodging}${foods}
    ${r.tip ? `<div class="tip">💡 ${r.tip}</div>` : ""}`;
}

function draw() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const q = document.getElementById("find").value.toLowerCase();
  const shown = rows.filter(r => !off.has(r.band) &&
    (!q || (r.town + " " + r.state).toLowerCase().includes(q)));
  shown.forEach(r => {
    const m = L.circleMarker([r.lat, r.lon], {
      radius: 5 + (r.total || 0) * 0.7, color: "#0009", weight: 1,
      fillColor: color(r.band), fillOpacity: 0.9,
    }).addTo(map).bindTooltip(`${r.town} · ${r.total}`, { direction: "top" });
    m.on("click", (ev) => { L.DomEvent.stopPropagation(ev); render(r); });
    markers.push(m);
  });
  if (shown.length && !q) map.fitBounds(L.latLngBounds(shown.map(r => [r.lat, r.lon])).pad(0.2));
}

function legend() {
  document.getElementById("legend").innerHTML = Object.entries(BANDS).map(([b, [, c, label]]) =>
    `<b data-b="${b}"><span class="dot" style="background:${c}"></span>${label}</b>`).join("");
  document.querySelectorAll("#legend b").forEach(el => el.onclick = () => {
    const b = el.dataset.b; off.has(b) ? off.delete(b) : off.add(b);
    el.classList.toggle("off"); draw();
  });
}

document.getElementById("find").oninput = draw;

// tap-to-toggle a dimension's "why" (touch devices where hover doesn't exist)
document.getElementById("panel").addEventListener("click", (e) => {
  const w = e.target.closest(".dimwrap.has");
  if (w) w.classList.toggle("show");
});

// ---- click-to-sweep ----
const $ = id => document.getElementById(id);
const BANDCLR = { "route-worthy": "#2e7d32", "acceptable": "#1565c0",
                  "marginal": "#f9a825", "filter-out": "#b0392b" };
let sweepCircle = null, sweepCenter = null, es = null, prevT;

function openSweep(latlng) {
  sweepCenter = latlng;
  $("sweepbox").hidden = false;
  $("sw-center").textContent = `center ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;
  drawCircle(); preview();
}
function drawCircle() {
  if (sweepCircle) map.removeLayer(sweepCircle);
  sweepCircle = L.circle(sweepCenter, { radius: (+$("sw-radius").value) * 1609.34,
    color: "#2b6cb0", weight: 1, fillColor: "#2b6cb0", fillOpacity: 0.08 }).addTo(map);
}
function qp() { return new URLSearchParams({ lat: sweepCenter.lat, lon: sweepCenter.lng,
  radius: $("sw-radius").value, mode: $("sw-mode").value }); }
function preview() {
  clearTimeout(prevT);
  prevT = setTimeout(() => {
    $("sw-preview").textContent = "…";
    fetch(`${API}/api/preview?${qp()}`).then(r => r.json())
      .then(d => $("sw-preview").innerHTML =
        `${d.towns} towns · <b>${d.to_score} new</b>${d.cached ? ` · ${d.cached} cached` : ""}`)
      .catch(() => $("sw-preview").textContent = "preview failed");
  }, 250);
}
$("sw-radius").oninput = () => { $("sw-rlabel").textContent = $("sw-radius").value + " mi"; drawCircle(); preview(); };
$("sw-mode").onchange = preview;
$("sw-close").onclick = () => { $("sweepbox").hidden = true;
  if (sweepCircle) { map.removeLayer(sweepCircle); sweepCircle = null; } if (es) es.close(); };
$("sw-go").onclick = () => {
  if (es) es.close();
  const btn = $("sw-go"); btn.disabled = true; btn.textContent = "Sweeping…";
  const live = L.layerGroup().addTo(map);
  es = new EventSource(`${API}/sweep?${qp()}`);
  es.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.event === "start") $("sw-prog").textContent = `scoring ${m.towns} towns…`;
    else if (m.event === "town") {
      $("sw-prog").innerHTML = `${m.i}/${m.n} ${m.src === "cache" ? "·" : "◆"} ${m.town} — ${m.total}`;
      L.circleMarker([m.lat, m.lon], { radius: 6, color: "#000a", weight: 1,
        fillColor: BANDCLR[m.band] || "#888", fillOpacity: 0.9 }).addTo(live);
    } else if (m.event === "done") {
      es.close(); es = null; btn.disabled = false; btn.textContent = "Sweep";
      $("sw-prog").textContent = "done ✓";
      load().then(() => { map.removeLayer(live);
        if (sweepCircle) map.fitBounds(sweepCircle.getBounds().pad(0.1)); });
    }
  };
  es.onerror = () => { $("sw-prog").textContent = "stream error";
    btn.disabled = false; btn.textContent = "Sweep"; if (es) es.close(); };
};
map.on("click", e => openSweep(e.latlng));
// keep clicks on the UI overlays from falling through to the map
["sweepbox", "bar", "legend"].forEach(id => {
  const el = $(id);
  if (el) { L.DomEvent.disableClickPropagation(el); L.DomEvent.disableScrollPropagation(el); }
});

function load() {
  return fetch(`${API}/api/verdicts`).then(r => r.json())
    .then(data => { rows = data; legend(); draw(); })
    .catch(e => { document.getElementById("panel").innerHTML =
      `<div class="empty">Couldn't reach the server.<br><br>${e}</div>`; });
}
load();
</script>
</body>
</html>
